<!doctype html>
<html lang="en" class="no-js">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script>
			(() => {
				const STATE_KEY = 'quote-slicer-docs:theme-state:v2';

				const root = document.documentElement;
				root.classList.replace('no-js', 'js');

				const osMode = window.matchMedia('(prefers-color-scheme: dark)').matches
					? 'dark'
					: 'light';

				const applyTheme = (mode) => {
					root.classList.toggle('dark', mode === 'dark');
					root.style.colorScheme = mode;
				};

				// ponytail: mirrors resolveTheme() in themeState.ts. The prepaint script
				// runs before hydration and can't import, so the "last change wins,
				// OS-drift-aware" rule is duplicated here. Keep the two in sync.
				try {
					const stored = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
					const valid =
						stored &&
						stored.version === 2 &&
						(stored.mode === 'dark' || stored.mode === 'light') &&
						(stored.osAtPick === 'dark' || stored.osAtPick === 'light');

					applyTheme(valid && stored.osAtPick === osMode ? stored.mode : osMode);
				} catch {
					applyTheme(osMode);
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
